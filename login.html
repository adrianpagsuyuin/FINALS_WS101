<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PTC Portal - Login</title>
<link rel="stylesheet" href="style.css"> 
    
<script> /*para sa logout button function*/
function login() {
let user = document.getElementById("user").value;
let password = document.getElementById("password").value;

if (user === "25BSIT-1504" && password === "1234") {
window.alert("Successful log in!");
window.location.href = "dashboard.html"; 
} else {
window.alert("Wrong password or user!");
document.getElementById("user").style.color = "red";
document.getElementById("password").style.color = "red";
}
}
</script>
</head>
<body>

<div class="login-wrapper">
        
<div class="login-container">
<img src="school logo.jpg" alt="PTC Logo">
            
<h2>Student Portal</h2>
<p id="">Please enter your credentials.</p>
            
<input type="text" id="user" value="" placeholder="Student ID" />
<br>
<input type="password" id="password" value="" placeholder="Password" />
<br>
            
<button type="button" onclick="login()">Login</button>
</div>

</div>

</body>
</html>
